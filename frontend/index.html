<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Largitdata WiFi Pool</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>
<div id="app">
  <!-- Sidebar -->
  <div id="sidebar">
    <div id="sidebar-resizer"></div>
    <div class="sidebar-header">
      <span>Largitdata WiFi Pool</span>
      <button id="sidebar-collapse-btn" onclick="toggleSidebar()">◀</button>
    </div>
    <div class="sidebar-section">
      <h3>Devices</h3>
      <div class="sidebar-actions">
        <button onclick="selectAll()">All</button>
        <button onclick="selectNone()">None</button>
        <button onclick="startViewing()">View</button>
      </div>
      <div class="device-list" id="deviceList">Loading...</div>
    </div>
  </div>

  <!-- Sidebar toggle -->
  <button id="sidebar-toggle" onclick="toggleSidebar()">◀</button>

  <!-- Main area -->
  <div id="main">
    <div id="toolbar">
      <label>Columns:</label>
      <input type="range" id="colSlider" min="1" max="10" value="8" oninput="updateCols()">
      <span class="val" id="colLabel">8</span>
      <button onclick="forcePortraitAll()">All Portrait</button>
      <button onclick="stopViewing()">Stop</button>

      <div class="toolbar-spacer"></div>

      <!-- SIM Switch Dropdown -->
      <div class="dropdown" id="simDropdown">
        <button class="dropdown-trigger" onclick="toggleDropdown('simDropdown')">SIM Switch ▾</button>
        <div class="dropdown-menu dropdown-right" id="simDropdownMenu">
          <div class="dropdown-section">
            <input type="text" class="sim-search" id="simSearch" placeholder="Search phone..." oninput="onSimSearch()">
            <div class="sim-search-results" id="simSearchResults"></div>
          </div>
          <div class="dropdown-divider"></div>
          <div class="dropdown-section">
            <div class="dropdown-row">
              <label>Group:</label>
              <select id="simOrder" class="sim-el"></select>
              <button onclick="switchAllSim()" class="sim-el dropdown-btn">Switch All</button>
            </div>
          </div>
          <div class="dropdown-divider"></div>
          <div class="dropdown-section">
            <button onclick="viewCurrentSim()" class="sim-el dropdown-btn" style="width:100%">View Current</button>
          </div>
        </div>
      </div>

      <!-- Notification Bell -->
      <div class="dropdown" id="notifDropdown">
        <button class="dropdown-trigger notif-bell" onclick="toggleDropdown('notifDropdown')">
          🔔<span class="notif-badge" id="notifBadge" style="display:none">0</span>
        </button>
        <div class="dropdown-menu dropdown-right notif-menu" id="notifDropdownMenu">
          <div class="notif-header">
            <span>Notifications</span>
            <div class="notif-header-actions">
              <button onclick="markAllRead()">All Read</button>
              <button onclick="clearAllNotifs()">Clear</button>
            </div>
          </div>
          <div class="notif-list" id="notifList">
            <div class="notif-empty">No notifications</div>
          </div>
        </div>
      </div>
    </div>

    <div id="grid"></div>
    <div id="statusbar">
      <span id="stDevices">Devices: -</span>
      <span id="stViewing">Viewing: 0</span>
      <span id="stInfo"></span>
    </div>
  </div>
</div>

<!-- Toast container -->
<div id="toastContainer"></div>

<script src="/app.js"></script>
</body>
</html>
